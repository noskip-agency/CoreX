version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: corex-app
    restart: unless-stopped
    ports:
      - "80:8000"
    volumes:
      - .:/app
    working_dir: /app
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    depends_on:
      - postgres
      - redis
    networks:
      - corex-network

  postgres:
    image: postgres:16-alpine
    container_name: corex-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: corex
      POSTGRES_USER: corex
      POSTGRES_PASSWORD: corex_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - corex-network

  redis:
    image: redis:7-alpine
    container_name: corex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - corex-network

volumes:
  postgres-data:
  redis-data:

networks:
  corex-network:
    driver: bridge
